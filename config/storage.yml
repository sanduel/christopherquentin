test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Cloudflare R2 (S3-compatible) for production file storage.
# Credentials read from Railway environment variables.
cloudflare:
  service: S3
  access_key_id: <%= ENV["CLOUDFLARE_R2_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["CLOUDFLARE_R2_SECRET_ACCESS_KEY"] %>
  region: auto
  bucket: <%= ENV.fetch("CLOUDFLARE_R2_BUCKET", "christopherquentin") %>
  endpoint: <%= ENV["CLOUDFLARE_R2_ENDPOINT"] %>
  # Cloudflare R2 rejects the CRC32 integrity checksum that aws-sdk-s3 >= 1.178
  # sends by default ("You can only specify one non-default checksum at a time").
  # Only send/validate checksums when the operation actually requires it.
  request_checksum_calculation: when_required
  response_checksum_validation: when_required

